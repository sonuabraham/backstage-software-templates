name: ${{values.app_name}}-cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Declare some variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
          echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> "$GITHUB_ENV"
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}
          password: ${{ '${{ secrets.DOCKERHUB_TOKEN }}' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sonuabraham/${{values.app_name}}:${{ '${{ env.COMMIT_ID }}' }}

    outputs:
      commit_id: ${{ '${{ env.COMMIT_ID }}' }}

  cd:
    runs-on: self-hosted
    needs: ci
    steps:
      - uses: actions/checkout@v3

      - name: Modify values file
        shell: bash
        run: |
          echo ${{ '${{ needs.ci.outputs.commit_id }}' }}
          curl -ksSL -o yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x yq
          ./yq -i '.image.tag = "${{ '${{ needs.ci.outputs.commit_id }}' }}"' charts/${{values.app_name}}/values-${{values.app_env}}.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update values.yaml with commit ${{ '${{ needs.ci.outputs.commit_id }}' }}"

      - name: Install Argocd
        shell: bash
        run: |
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd

      - name: Argocd App Create and Sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure --username admin \
            --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}

          argocd app create ${{values.app_name}} \
            --repo https://github.com/sonuabraham-org/${{values.app_name}}.git \
            --path charts/${{values.app_name}} \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace default \
            --values values-${{values.app_env}}.yaml \
            --sync-policy automated \
            --upsert

          argocd app sync ${{values.app_name}}
